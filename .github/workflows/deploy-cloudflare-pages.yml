name: Deploy Movecares to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: movecares-cloudflare-pages-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: 3b0bd76ccf8d28104a7abb8fad86a485
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build static SEO network
        run: npm run build

      - name: Smoke static SEO output
        run: npm run smoke:seo

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4.100.0 pages deploy dist --project-name movecares --branch main --commit-dirty=true
